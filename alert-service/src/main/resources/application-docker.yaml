server:
  port: 8084

spring:
  application:
    name: alert-service

  datasource:
    url: jdbc:postgresql://postgres-alert:5432/${ALERT_DB_NAME}
    username: ${ALERT_DB_USER}
    password: ${ALERT_DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/smart-city
          jwk-set-uri: http://keycloak:8080/realms/smart-city/protocol/openid-connect/certs


  kafka:
    bootstrap-servers: kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.trusted.packages: "com.fitgeek.shared.events"
        spring.json.type.mapping: >-
          alertCreated:com.fitgeek.shared.events.AlertCreatedEvent,
          sensorReading:com.fitgeek.shared.events.SensorReadingEvent

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG