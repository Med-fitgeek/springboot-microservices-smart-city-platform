server:
  port: 8082

spring:
  application:
    name: device-service

  datasource:
    url: jdbc:postgresql://postgres-device:5432/device_db
    username: device
    password: device

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/smart-city
          jwk-set-uri: http://keycloak:8080/realms/smart-city/protocol/openid-connect/certs

  jpa:
    hibernate:
      ddl-auto: validate

    open-in-view: false

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: kafka:9092

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG