server:
  port: 8082

spring:
  application:
    name: device-service

  datasource:
    url: jdbc:postgresql://localhost:5432/device_db
    username: postgres
    password: 1331

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/smart-city

  jpa:
    hibernate:
      ddl-auto: validate

    open-in-view: false

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: kafka:9092