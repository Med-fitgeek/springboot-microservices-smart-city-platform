server:
  port: 8081

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: device-service
              uri: http://device-service:8082
              predicates:
                - Path=/api/devices/**
            - id: monitoring-service
              uri: http://monitoring-service:8083
              predicates:
                - Path=/api/monitoring/**
            - id: alert-service
              uri: http://alert-service:8084
              predicates:
                - Path=/api/alerts/**

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/smart-city/protocol/openid-connect/certs

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
